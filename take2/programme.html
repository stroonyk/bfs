<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programme - Berkhamsted Film Society</title>
    <meta
      name="description"
      content="Film programme for Berkhamsted Film Society 2025/2026 season."
    />
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon" />
    <link href="assets/style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="logo">
          <img
            src="assets/images/bfs_logo.jpg"
            alt="Berkhamsted Film Society"
          />
        </div>
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav id="nav">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="programme.html" class="active">Programme</a></li>
            <li><a href="join.html">Joining</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="links.html">Links</a></li>
            <li><a href="reactions.html">Reactions</a></li>
          </ul>
        </nav>
        <a
          href="https://www.instagram.com/berkofilm/"
          class="social-link"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Instagram"
        >
          <img
            src="assets/images/Instagram_logo_2016.svg.png"
            alt="Instagram"
          />
        </a>
      </div>
    </header>

    <main class="container">
      <section class="page-content programme-page">
        <div class="page-header">
          <h1>Programme</h1>
          <div class="season-selector">
            <label for="season-select">Season:</label>
            <select id="season-select" class="season-dropdown">
              <option value="2026-2027">2026/2027</option>
              <option value="2025-2026" selected>2025/2026</option>
            </select>
          </div>
        </div>

        <div id="loading" class="loading">Loading films...</div>
        <div id="error" class="error" style="display: none">
          Unable to load films. Please try again later.
        </div>

        <div id="film-grid" class="film-grid"></div>
      </section>
    </main>

    <!-- Trailer Modal -->
    <div id="trailer-modal" class="trailer-modal">
      <div class="modal-content">
        <span class="modal-close" onclick="closeTrailerModal()">&times;</span>
        <h2 id="modal-title"></h2>
        <div class="video-container">
          <iframe
            id="trailer-iframe"
            width="100%"
            height="100%"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>
        </div>
      </div>
    </div>

    <footer>
      <div class="container">
        <p>
          Berkhamsted Film Society |
          <a href="mailto:berkhamstedfilmsociety@gmail.com"
            >berkhamstedfilmsociety@gmail.com</a
          >
        </p>
        <p>&copy; Berkhamsted Film Society. All rights reserved.</p>
      </div>
    </footer>

    <script src="assets/js/common.js"></script>
    <script src="assets/js/programme.js"></script>
  </body>
</html>
