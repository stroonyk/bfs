<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - Berkhamsted Film Society</title>
    <meta name="description" content="Search results for Berkhamsted Film Society films.">
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
    <link href="assets/style.css" rel="stylesheet" type="text/css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <img src="assets/images/bfs_logo.jpg" alt="Berkhamsted Film Society">
            </div>
            <button class="hamburger" id="hamburger" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav id="nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="programme.html">Programme</a></li>
                    <li><a href="join.html">Joining</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="links.html">Links</a></li>
                    <li><a href="reactions.html">Reactions</a></li>
                </ul>
            </nav>
            <button class="search-icon" id="search-icon" aria-label="Search">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
            </button>
            <a href="https://www.instagram.com/berkofilm/" class="social-link" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                <img src="assets/images/Instagram_logo_2016.svg.png" alt="Instagram">
            </a>
        </div>
    </header>

    <!-- Search Modal -->
    <div id="search-modal" class="search-modal">
        <div class="search-modal-content">
            <button class="search-close" id="search-close">&times;</button>
            <h2>Search Films</h2>
            <div class="search-input-container">
                <input type="text" id="search-input" placeholder="Search by film title..." />
                <button id="search-button" class="search-button">Search</button>
            </div>
        </div>
    </div>

    <main class="container">
        <section class="page-content programme-page">
            <h1>Search Results</h1>
            <p id="search-query" class="search-query-text"></p>

            <div id="search-loading" class="loading" style="display: none;">Searching...</div>

            <div id="search-results" class="film-grid"></div>

            <div id="no-results" class="no-results" style="display: none;">
                <p>No films found matching your search.</p>
                <button class="search-again-btn" onclick="document.getElementById('search-icon').click()">Search Again</button>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>Berkhamsted Film Society | <a href="mailto:berkhamstedfilmsociety@gmail.com">berkhamstedfilmsociety@gmail.com</a></p>
            <p>&copy; Berkhamsted Film Society. All rights reserved.</p>
        </div>
    </footer>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/search.js"></script>
    <script src="assets/js/search-results.js"></script>
</body>
</html>
